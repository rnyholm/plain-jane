javaparser = "3.28.0"
caffeine = "3.2.3"
slf4j = "2.0.17"
junit = "6.0.3"
mockk = "1.14.9"

[libraries]
clikt = { group = "com.github.ajalt.clikt", name = "clikt", version.ref = "clikt" }
