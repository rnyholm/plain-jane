name: Release Plain Jane

on:
  push:
    tags:
      - 'v*' # trigger on pushing tags like v1.0.0

permissions:
  contents: write # required in order to upload files to GitHub Releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Fat JAR
        run: ./gradlew shadowJar

      - name: Create Release and Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/plain-jane.jar
          generate_release_notes: true
